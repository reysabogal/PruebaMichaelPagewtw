<h2 mat-dialog-title>Eliminar usuario</h2>

<mat-dialog-content>
  <p>Desea eliminar el usuario {{ data.name }}?</p>

  @if (errorMessage) {
    <p class="error-message">{{ errorMessage }}</p>
  }
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button type="button" (click)="closeDialog()">No</button>
  <button mat-raised-button color="warn" type="button" (click)="confirmDelete()">
    Si Eliminar
  </button>
</mat-dialog-actions>
