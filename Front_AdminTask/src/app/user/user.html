<section class="user-page">
  <div class="header">
    <h1>Lista de Usuarios</h1>
    <button mat-raised-button color="primary" type="button" (click)="addUser()">
      Nuevo Usuario
    </button>

    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar por nombre</mat-label>
      <input
        matInput
        type="text"
        [(ngModel)]="searchName"
        (input)="applyNameFilter()"
      />
      @if (searchName) {
        <button
          matSuffix
          mat-icon-button
          type="button"
          aria-label="Limpiar busqueda"
          (click)="searchName = ''; applyNameFilter()"
        >
          <mat-icon>close</mat-icon>
        </button>
      }
    </mat-form-field>
  </div>

  <div class="table-wrapper mat-elevation-z2">
    <table mat-table [dataSource]="dataSource" class="user-table">
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let user">{{ user.name }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef>Email</th>
        <td mat-cell *matCellDef="let user">{{ user.email }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let user" class="actions-cell">
          <button
            mat-icon-button
            type="button"
            aria-label="Editar usuario"
            (click)="editUser(user)"
          >
            <mat-icon>edit</mat-icon>
          </button>

          <button
            mat-icon-button
            type="button"
            aria-label="Eliminar usuario"
            (click)="deleteUser(user)"
          >
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
    </table>

    <mat-paginator      
      [pageSizeOptions]="[5, 10, 20]"
      showFirstLastButtons
      aria-label="Paginacion de usuarios"
    />
  </div>
</section>
